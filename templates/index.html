<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Birikim Mimarı - Pro Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f4f7f6; --card: white; --text: #333; --border: #ecf0f1; }
        .dark-mode { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --border: #333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background-color: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 850px; margin-bottom: 20px; }
        .header-top { display: flex; justify-content: space-between; width: 100%; max-width: 850px; margin-bottom: 15px; }
        .bakiye-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .bakiye-box { padding: 15px; border-radius: 12px; border: 1px solid #2ecc71; background: rgba(46, 204, 113, 0.05); text-align: center; }
        .bakiye-val { font-size: 24px; font-weight: bold; color: #27ae60; }
        .form-alani { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .form-alani input { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); width: 120px; }
        .btn-ekle { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .satir { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); align-items: center; }
        .up { color: #2ecc71; } .down { color: #e74c3c; }
        .haber-karti { background: rgba(52, 152, 219, 0.1); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #3498db; }
        .haber-karti a { text-decoration: none; color: var(--text); font-weight: bold; font-size: 14px; }
        .dark-btn { cursor: pointer; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text); }
    </style>
</head>
<body>

    <div class="header-top">
        <span id="kur" style="color:#7f8c8d">Yükleniyor...</span>
        <button class="dark-btn" onclick="document.body.classList.toggle('dark-mode')">🌙 Gece Modu</button>
    </div>

    <div class="container">
        <h1 style="text-align:center; margin-top:0;">Birikim Mimarı <small style="font-size:12px; opacity:0.6">v2.5</small></h1>

        <div class="bakiye-grid">
            <div class="bakiye-box"><div>USD Portföy</div><div class="bakiye-val" id="usd">$0.00</div></div>
            <div class="bakiye-box" style="border-color:#f1c40f"><div>TRY Karşılığı</div><div class="bakiye-val" id="try" style="color:#d35400">0 TL</div></div>
        </div>

        <div class="form-alani">
            <input type="text" id="k" placeholder="Kod (NVDA)">
            <input type="number" id="a" placeholder="Adet" step="0.01">
            <input type="number" id="m" placeholder="Maliyet $" step="0.01">
            <button class="btn-ekle" onclick="ekle()">Ekle</button>
        </div>

        <div id="liste"></div>
        <div style="height:300px; margin-top:20px;"><canvas id="grafik"></canvas></div>
    </div>

    <div class="container" id="haberler">
        <h3>🚨 Canlı Haber Radarı</h3>
    </div>

    <script>
        let myChart = null;
        let hafiza = new Set();

        async function ekle() {
            const payload = {
                kod: document.getElementById('k').value.toUpperCase(),
                adet: parseFloat(document.getElementById('a').value),
                maliyet: parseFloat(document.getElementById('m').value)
            };
            if(!payload.kod || !payload.adet) return;

            await fetch('/api/portfoy/ekle', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            document.getElementById('k').value = '';
            document.getElementById('a').value = '';
            document.getElementById('m').value = '';

            // Sayfayı yenilemeden güncelle (Bildirim hafızası kaybolmasın diye)
            await render();
            await haberleriCek(true);
        }

        async function sil(kod) {
            await fetch(`/api/portfoy/sil/${kod}`, {method: 'DELETE'});
            await render();
            await haberleriCek(false);
        }

        async function render() {
            const r = await fetch('/api/portfoy');
            const d = await r.json();

            document.getElementById('usd').innerText = `$${d.toplam_usd.toLocaleString()}`;
            document.getElementById('try').innerText = `${d.toplam_try.toLocaleString()} TL`;
            document.getElementById('kur').innerText = `USD/TRY: ${d.dolar_kuru}`;

            const liste = document.getElementById('liste');
            liste.innerHTML = '';
            const labels = []; const values = [];

            for (const [kod, info] of Object.entries(d.detay)) {
                labels.push(kod); values.push(info.toplam_usd);
                const kzClass = info.kar_zarar_usd >= 0 ? 'up' : 'down';
                liste.innerHTML += `
                    <div class="satir">
                        <div><b>${kod}</b><br><small>${info.adet} @ $${info.maliyet}</small></div>
                        <div style="text-align:right">
                            <div class="${kzClass}">${info.kar_zarar_usd >= 0 ? '▲' : '▼'} %${info.kar_zarar_yuzde}</div>
                            <b>$${info.toplam_usd}</b>
                        </div>
                        <button onclick="sil('${kod}')" style="background:none; border:none; cursor:pointer; color:#e74c3c">✖</button>
                    </div>`;
            }

            if(myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('grafik'), {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: values, backgroundColor: ['#3498db','#2ecc71','#f1c40f','#e74c3c','#9b59b6'] }] },
                options: { maintainAspectRatio: false }
            });
        }

        async function haberleriCek(bildirimAt = false) {
            const r = await fetch('/api/haberler');
            const d = await r.json();
            const alan = document.getElementById('haberler');
            alan.innerHTML = '<h3>🚨 Canlı Haber Radarı</h3>';

            for (const [hisse, haberler] of Object.entries(d)) {
                haberler.forEach(h => {
                    alan.innerHTML += `<div class="haber-karti"><a href="${h.link}" target="_blank">${hisse}: ${h.baslik}</a><br><small>${h.kaynak}</small></div>`;
                    if(!hafiza.has(h.link)) {
                        hafiza.add(h.link);
                        if(bildirimAt && Notification.permission === "granted") {
                            new Notification(`Yeni Haber: ${hisse}`, { body: h.baslik });
                        }
                    }
                });
            }
        }

        async function baslat() {
            if(Notification.permission !== "denied") await Notification.requestPermission();
            await render();
            await haberleriCek(false);
            setInterval(() => haberleriCek(true), 60000);
        }
        baslat();
    </script>
</body>
</html>
